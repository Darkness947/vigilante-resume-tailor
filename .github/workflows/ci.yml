name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Check Formatting
      run: npm run format:check || true

    - name: Lint
      run: npm run lint

    - name: Type Check
      run: npx tsc --noEmit

    - name: Run Unit Tests
      run: npm run test:unit
